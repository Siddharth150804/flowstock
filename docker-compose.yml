version: '3.8'

services:
  # ----------------- Database Service -----------------
  db:
    image: postgres:15-alpine
    container_name: flowstock-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inventory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inventory"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ----------------- Backend API Service -----------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flowstock-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/inventory
      ENVIRONMENT: production
    depends_on:
      db:
        condition: service_healthy

  # ----------------- Frontend Web Service -----------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000/api
    container_name: flowstock-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
    name: flowstock_postgres_data
